<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#6ee7b7" />
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.4" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" rx="160" fill="url(#bgGrad)" />

  <circle cx="400" cy="400" r="280" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="8 12" />
  <circle cx="400" cy="400" r="220" fill="none" stroke="url(#lineGrad)" stroke-width="3" />

  <g filter="url(#neonGlow)">
    <circle cx="400" cy="400" r="35" fill="url(#primaryGrad)" />
    <circle cx="400" cy="400" r="55" fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.5" />

    <path d="M400,400 Q400,220 520,160 Q430,280 400,400 Z" fill="url(#primaryGrad)" opacity="0.95" />
    <path d="M400,400 Q400,250 310,190 Q370,300 400,400 Z" fill="url(#primaryGrad)" opacity="0.75" />
    
    <path d="M400,400 L400,600" stroke="url(#primaryGrad)" stroke-width="6" stroke-linecap="round" />
    <path d="M400,400 L240,480" stroke="url(#primaryGrad)" stroke-width="5" stroke-linecap="round" />
    <path d="M400,400 L560,480" stroke="url(#primaryGrad)" stroke-width="5" stroke-linecap="round" />

    <circle cx="400" cy="600" r="16" fill="#030712" stroke="#6ee7b7" stroke-width="5" />
    <circle cx="240" cy="480" r="14" fill="#030712" stroke="#34d399" stroke-width="5" />
    <circle cx="560" cy="480" r="14" fill="#030712" stroke="#34d399" stroke-width="5" />
    <circle cx="520" cy="160" r="18" fill="#ffffff" stroke="#10b981" stroke-width="6" />
    <circle cx="310" cy="190" r="12" fill="#030712" stroke="#6ee7b7" stroke-width="4" />
  </g>

  <path d="M280,640 L520,640" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" />
  <path d="M320,670 L480,670" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round" />
</svg>
